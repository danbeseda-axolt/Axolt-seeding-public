<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Axolt Pilot — Výsledky</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root { --cream:#efebe7; --black:#000; --red:#ff333d; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--cream); color:var(--black);
           font-family:"Open Sans",system-ui,sans-serif; min-height:100vh;
           display:flex; align-items:center; justify-content:center; padding:32px; }
    .card { max-width:640px; text-align:center; }
    h1 { font-family:"Manrope",sans-serif; font-weight:800; font-size:2.4rem; margin:0 0 12px; }
    .accent { color:var(--red); }
    p { font-size:1.05rem; line-height:1.6; opacity:.85; }
    .tag { font-family:"Manrope",sans-serif; font-weight:600; letter-spacing:.12em;
           text-transform:uppercase; font-size:.78rem; opacity:.6; }
  </style>
</head>
<body>
  <main class="card">
    <div class="tag">Axolt · Pilot ČR</div>
    <h1>Výsledky pilotu <span class="accent">brzy</span></h1>
    <p>Tahle stránka bude zobrazovat anonymizované souhrnné výsledky pilotní studie Axolt — průměry napříč šesti oblastmi, NPS a průběh studie. Aktualizuje se automaticky každý den.</p>
  </main>
</body>
</html>
